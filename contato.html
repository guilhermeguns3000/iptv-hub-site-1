<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - IPTV Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://iptu2022br.com.br/contato.html">
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>
<body>
    <div class="bg-glow"></div>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo font-heading">IPTV<span>HUB</span></a>
                
                <div class="nav-links" id="navLinks">
                    <a href="index.html">Home</a>
                    <a href="comparativo.html">Comparativo</a>
                    <a href="https://coreplaytv.com.br" target="_blank" class="btn btn-primary header-btn" style="padding: 10px 20px; font-size: 0.9rem;">Testar Grátis</a>
                </div>

                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 80px 0; max-width: 600px;">
        <h1 style="margin-bottom: 30px; text-align: center;">Fale Conosco</h1>
        <div class="glass-card">
            <form style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px;">Nome Completo</label>
                    <input type="text" placeholder="Seu nome" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">E-mail Corporativo</label>
                    <input type="email" placeholder="seu@email.com" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">Mensagem</label>
                    <textarea placeholder="Como podemos ajudar?" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; height: 150px; font-family: inherit;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Enviar Mensagem</button>
            </form>
        </div>
    </main>

    <footer class="container" style="padding: 40px 0; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); font-size: 0.9rem;">
        <p>&copy; 2026 IPTUHUB. Todos os direitos reservados.</p>
    </footer>
    <script>
        // MOBILE MENU TOGGLE
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        const links = document.querySelectorAll('.nav-links a');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'initial';
        });

        links.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                document.body.style.overflow = 'initial';
            });
        });

        // SCROLL EFFECT
        const header = document.querySelector('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
